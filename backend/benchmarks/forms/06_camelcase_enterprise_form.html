<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Benchmark 06 - CamelCase Enterprise Form</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; max-width: 620px; }
    input, textarea { display: block; width: 100%; padding: 10px; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>Enterprise Talent Pool</h1>
  <form>
    <input id="candidateFullName" name="candidateFullName" type="text" required>
    <input id="candidateEmailAddress" name="candidateEmailAddress" type="email" required>
    <input id="candidatePhoneNumber" name="candidatePhoneNumber" type="tel">
    <input id="almaMater" name="almaMater" type="text">
    <input id="degreeMajor" name="degreeMajor" type="text">
    <input id="linkedInProfile" name="linkedInProfile" type="url">
    <input id="githubUrl" name="githubUrl" type="url">
    <textarea id="personalIntroduction" name="personalIntroduction"></textarea>
    <button id="continueButton" type="button">Continue</button>
  </form>
</body>
</html>
