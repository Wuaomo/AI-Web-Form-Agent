<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Benchmark 03 - Placeholder Only Profile</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; max-width: 620px; }
    input, textarea { display: block; width: 100%; padding: 10px; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>Profile Card</h1>
  <form>
    <input id="profile-name" name="candidate" type="text" placeholder="Full name" required>
    <input id="profile-email" name="contact" type="email" placeholder="Email address" required>
    <input id="profile-phone" name="mobile" type="tel" placeholder="Mobile number">
    <input id="profile-school" name="school" type="text" placeholder="University or college">
    <input id="profile-specialization" name="specialization" type="text" placeholder="Degree major">
    <textarea id="profile-bio" name="bio" placeholder="Short biography"></textarea>
    <button id="save-profile" type="button">Save profile</button>
  </form>
</body>
</html>
