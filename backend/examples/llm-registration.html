<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Mapping Challenge</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #172033;
      background: #eef2f7;
    }

    .form-card {
      width: min(100%, 540px);
      padding: 30px;
      border-radius: 10px;
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.13);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #5d6b82;
    }

    .name-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #c8d2e1;
      border-radius: 8px;
      background: #ffffff;
      font: inherit;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #0f766e;
      outline: 3px solid rgba(15, 118, 110, 0.14);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #0f766e;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #115e59;
    }

    #form-message {
      min-height: 20px;
      margin: 16px 0 0;
      color: #166534;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="form-card">
    <h1>Mentor Program Application</h1>
    <p class="subtitle">This form uses human wording instead of profile key names.</p>

    <form id="llm-registration-form">
      <div class="name-grid">
        <div class="form-group">
          <label for="FirstName">Given name</label>
          <input id="FirstName" name="FirstName" type="text" autocomplete="given-name" required>
        </div>

        <div class="form-group">
          <label for="LastName">Family name</label>
          <input id="LastName" name="LastName" type="text" autocomplete="family-name" required>
        </div>
      </div>

      <div class="form-group">
        <label for="reach-channel">Where can we reach you?</label>
        <input
          id="reach-channel"
          name="preferred_contact_destination"
          type="email"
          placeholder="Best email for program updates"
          required
        >
      </div>

      <div class="form-group">
        <label for="campus-home">Current campus or institution</label>
        <input id="campus-home" name="academic_home" type="text" required>
      </div>

      <div class="form-group">
        <label for="study-focus">What do you study most closely?</label>
        <input id="study-focus" name="learning_focus" type="text" required>
      </div>

      <div class="form-group">
        <label for="portfolio-link">Show us your code portfolio</label>
        <input
          id="portfolio-link"
          name="developer_portfolio"
          type="url"
          placeholder="A public code hosting profile"
        >
      </div>

      <div class="form-group">
        <label for="builder-story">Brief self introduction</label>
        <textarea
          id="builder-story"
          name="builder_story"
          placeholder="A short personal introduction for the review team"
          required
        ></textarea>
      </div>

      <button type="submit">Submit application</button>
      <p id="form-message" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#llm-registration-form");
    const message = document.querySelector("#form-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      message.textContent = "Form validated successfully. No data was sent.";
    });
  </script>
</body>
</html>
