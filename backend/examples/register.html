<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    .form-card {
      width: min(100%, 480px);
      padding: 32px;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font: inherit;
    }

    input:focus {
      border-color: #2563eb;
      outline: 3px solid rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #2563eb;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #form-message {
      min-height: 20px;
      margin: 16px 0 0;
      color: #15803d;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="form-card">
    <h1>Student Registration</h1>
    <p class="subtitle">Please enter your student information.</p>

    <form id="registration-form">
      <div class="form-group">
        <label for="full-name">Full name</label>
        <input id="full-name" name="full_name" type="text" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="university">University</label>
        <input id="university" name="university" type="text" autocomplete="organization" required>
      </div>

      <div class="form-group">
        <label for="major">Major</label>
        <input id="major" name="major" type="text" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" required>
      </div>

      <button type="submit">Submit registration</button>
      <p id="form-message" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#registration-form");
    const message = document.querySelector("#form-message");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      message.textContent = "Form validated successfully. No data was sent.";
    });
  </script>
</body>
</html>
